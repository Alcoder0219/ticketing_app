# SPA server config (rendered from a template at container start; ${PORT} is
# substituted by the nginx image's envsubst — Cloud Run injects PORT=8080).
server {
    listen       ${PORT};
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compress text assets.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css application/json application/javascript
        application/xml application/xml+rss text/javascript image/svg+xml;

    # Hashed build assets are immutable — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache the HTML shell, so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: any unknown path serves index.html so React Router deep
    # links (and hard refreshes on a route) resolve correctly.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
